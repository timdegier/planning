      --cellpad: 7px;

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); }

    .app { display: flex; flex-direction: column; min-height: 100%; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 16px 28px; background: var(--panel); border-bottom: 1px solid var(--hair); }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark { width: 34px; height: 34px; border-radius: 8px; flex: none; background: linear-gradient(135deg, var(--cost), color-mix(in oklch, var(--cost) 55%, var(--fl))); position: relative; }
    .brand-mark::after { content: ""; position: absolute; inset: 11px 14px; border-radius: 2px; background: white; opacity: 0.92; box-shadow: 6px 0 0 -2px white, -6px 0 0 -2px white; }
    .brand h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .brand-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

    .seg-btn:hover { color: var(--ink); }
    .seg-btn.on { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(20,30,45,.1), 0 0 0 1px var(--hair); }
    .summary { display: grid; grid-template-columns: 1fr 600px; gap: 22px; align-items: stretch; padding: 20px 28px; background: var(--panel); border-bottom: 1px solid var(--hair); }
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

    .kpi-sub { font-size: 11.5px; color: var(--ink-3); }

    .cell.num { text-align: right; }

    .tot.cost span { color: color-mix(in oklch, var(--cost) 80%, black); }
    .tot.fl span { color: color-mix(in oklch, var(--fl) 78%, black); }
    .tbar { flex: 1; height: 4px; background: var(--hair-2); border-radius: 3px; overflow: hidden; max-width: 46px; }
    .tbar-fill { height: 100%; border-radius: 3px; }

    .group-tot { position: sticky; right: 0; z-index: 2; padding: 4px 12px; border-left: 1px solid var(--hair); }
    .group-tot .tot span { font-size: 11.5px; font-weight: 700; }
    .matrix tfoot td, .matrix tfoot th { position: sticky; bottom: 0; z-index: 3; background: oklch(0.22 0.02 255); color: white; border-bottom: 0; border-right-color: oklch(0.32 0.02 255); }

    }

  <style>
    :root {

      --ink-3: oklch(0.66 0.015 255);
      --hair: oklch(0.915 0.006 255);

      --fl: oklch(0.64 0.11 195);
      --flag: oklch(0.6 0.19 32);
      --ok: oklch(0.56 0.12 155);
      --cost-soft: color-mix(in oklch, var(--cost) 16%, white);
      --fl-soft: color-mix(in oklch, var(--fl) 16%, white);
      --rowh: 40px;
      --cellpad: 7px;
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); }
    body { color: var(--ink); font-family: "IBM Plex Sans", system-ui, sans-serif; font-size: 14px; line-height: 1.4; }
    #root { height: 100%; }
    .app { display: flex; flex-direction: column; min-height: 100%; }

    .brand h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

    .seg { display: inline-flex; background: var(--hair-2); border: 1px solid var(--hair); border-radius: 9px; padding: 2px; }

    .summary { display: grid; grid-template-columns: 1fr 600px; gap: 22px; align-items: stretch; padding: 20px 28px; background: var(--panel); border-bottom: 1px solid var(--hair); }
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .kpi { border: 1px solid var(--hair); border-radius: 12px; padding: 14px 16px; background: var(--panel); display: flex; flex-direction: column; justify-content: center; }

    .matrix-wrap { border: 1px solid var(--hair); border-radius: 12px; overflow: auto; max-height: 100%; background: var(--panel); }

    .matrix thead .corner { left: 0; z-index: 5; text-align: left; padding: 10px 14px; vertical-align: bottom; }

    .matrix thead .wk { padding: 8px 6px; text-align: center; }

    .matrix thead .tot-head { right: 0; z-index: 5; text-align: right; padding: 10px 14px; font-size: 12px; font-weight: 600; }
    .rowhead { position: sticky; left: 0; z-index: 2; background: var(--panel); text-align: left; padding: 0 12px; }

    .flag-dot { width: 15px; height: 15px; flex: none; border-radius: 50%; background: var(--flag); color: white; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    .show-row.flagged .rowhead { box-shadow: inset 3px 0 0 var(--flag); }
    .cell { padding: 0 var(--cellpad); height: var(--rowh); text-align: center; position: relative; vertical-align: middle; }
    .show-row:hover .cell { background: color-mix(in oklch, var(--cost) 3.5%, white); }
    .cell.empty { color: var(--hair); }

    .dual { display: flex; flex-direction: column; gap: 4px; justify-content: center; padding: 0 1px; }
    .track { height: 5px; background: var(--hair-2); border-radius: 3px; overflow: hidden; }
    .fill { height: 100%; border-radius: 3px; }

    .cell.num { text-align: right; }

    .heat.cost { background: var(--cost); } .heat.fl { background: var(--fl); }
    .cval { position: relative; font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; font-size: 11.5px; padding-right: 2px; }
    .total-cell { position: sticky; right: 0; z-index: 1; background: var(--panel); padding: 4px 12px; border-left: 1px solid var(--hair); }
    .show-row:hover .total-cell { background: color-mix(in oklch, var(--cost) 5%, white); }
    .tot { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }
    .tot span { font-family: "IBM Plex Mono", monospace; font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 600; min-width: 42px; text-align: right; }
    .tot.cost span { color: color-mix(in oklch, var(--cost) 80%, black); }
    .tot.fl span { color: color-mix(in oklch, var(--fl) 78%, black); }
